<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Scroll Portfolio</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  color:white;
  font-family:Arial;
}

/* scroll container */
.scrollArea{
  height:300vh; /* fake scroll world */
}

canvas{
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div class="scrollArea"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// =====================
// SCENE SETUP
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// OBJECTS (WORLD)
// =====================
const geometry = new THREE.BoxGeometry(1,1,1);

const material = new THREE.MeshStandardMaterial({
  color:0x00ffff,
  metalness:0.7,
  roughness:0.2
});

// multiple objects = "world"
const cubes = [];

for(let i=0;i<20;i++){
  const cube = new THREE.Mesh(geometry, material);
  cube.position.x = (Math.random()-0.5)*10;
  cube.position.y = (Math.random()-0.5)*10;
  cube.position.z = -i*5;

  scene.add(cube);
  cubes.push(cube);
}

// lights
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x222222));

camera.position.z = 5;

// =====================
// SCROLL → CAMERA MOVE
// =====================
let scrollY = 0;

window.addEventListener("scroll",()=>{
  scrollY = window.scrollY;
});

// =====================
// ANIMATION LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  // camera moves forward based on scroll
  camera.position.z = 5 + scrollY * 0.02;

  // subtle camera drift
  camera.position.x = Math.sin(scrollY*0.001) * 2;

  // rotate cubes
  cubes.forEach((c)=>{
    c.rotation.x += 0.01;
    c.rotation.y += 0.01;
  });

  renderer.render(scene, camera);
}

animate();

// resize fix
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
