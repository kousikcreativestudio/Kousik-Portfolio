<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kousik | Acko Level 3D Portfolio</title>

<style>
body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:white;
  font-family:Arial;
}

/* overlay UI */
.ui{
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
  color:cyan;
  font-size:14px;
  opacity:0.8;
}

/* scroll container */
.scroll{
  height:400vh;
}

/* canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div class="ui">🔥 Acko-Level 3D Portfolio — Scroll to travel</div>
<div class="scroll"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// =========================
// SCENE
// =========================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 60);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// =========================
// LIGHTING (IMPORTANT FOR AAA FEEL)
// =========================
const ambient = new THREE.AmbientLight(0x222222);
scene.add(ambient);

const pointLight = new THREE.PointLight(0x00ffff, 2);
pointLight.position.set(5,5,5);
scene.add(pointLight);

// =========================
// 3D PROJECT OBJECTS (WORLD)
// =========================
const group = new THREE.Group();
scene.add(group);

const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshStandardMaterial({
  color:0x00ffff,
  metalness:0.6,
  roughness:0.3
});

const projects = [];

for(let i=0;i<30;i++){

  const box = new THREE.Mesh(geometry, material);

  box.position.x = (Math.random()-0.5)*10;
  box.position.y = (Math.random()-0.5)*10;
  box.position.z = -i*4;

  box.rotation.x = Math.random();
  box.rotation.y = Math.random();

  group.add(box);
  projects.push(box);
}

// =========================
// SCROLL CONTROL (CORE Acko SYSTEM)
// =========================
let scrollY = 0;

window.addEventListener("scroll",()=>{
  scrollY = window.scrollY;
});

// =========================
// MOUSE PARALLAX
// =========================
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove",(e)=>{
  mouseX = (e.clientX/window.innerWidth - 0.5);
  mouseY = (e.clientY/window.innerHeight - 0.5);
});

// =========================
// ANIMATION LOOP
// =========================
function animate(){
  requestAnimationFrame(animate);

  // 🎥 CAMERA TRAVEL (ACKO STYLE CORE)
  camera.position.z = 5 + scrollY * 0.04;
  camera.position.x += (mouseX * 2 - camera.position.x) * 0.05;
  camera.position.y += (-mouseY * 2 - camera.position.y) * 0.05;

  // 🎯 LOOK AT CENTER
  camera.lookAt(0,0,0);

  // 🔁 OBJECT ANIMATION
  projects.forEach((p,i)=>{
    p.rotation.x += 0.005;
    p.rotation.y += 0.01;
  });

  renderer.render(scene,camera);
}

animate();

// =========================
// RESIZE FIX
// =========================
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
