<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic 3D Portfolio</title>

<style>
body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:white;
  font-family:Arial;
}

/* UI */
.ui{
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
  color:#00ffff;
  font-size:14px;
  opacity:0.8;
}

/* scroll space */
.scroll{
  height:500vh;
}

canvas{
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div class="ui">🎬 Cinematic 3D Portfolio — Scroll + Click Objects</div>
<div class="scroll"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 80);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(0,0,5);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// =====================
// LIGHTS (GLOW FEEL)
// =====================
const light = new THREE.PointLight(0x00ffff, 2);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x111111));

// =====================
// 3D PROJECT OBJECTS (CLICKABLE)
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

const geometry = new THREE.IcosahedronGeometry(1,0);
const material = new THREE.MeshStandardMaterial({
  color:0x00ffff,
  emissive:0x003333,
  metalness:0.6,
  roughness:0.3
});

const projects = [];

for(let i=0;i<12;i++){
  const obj = new THREE.Mesh(geometry, material);

  obj.position.x = (Math.random()-0.5)*8;
  obj.position.y = (Math.random()-0.5)*6;
  obj.position.z = -i*6;

  obj.userData = {
    name: "Project " + (i+1),
    url: "https://example.com"
  };

  scene.add(obj);
  projects.push(obj);
}

// =====================
// SCROLL → CINEMATIC CAMERA PATH
// =====================
let scrollY = 0;

window.addEventListener("scroll",()=>{
  scrollY = window.scrollY;
});

// =====================
// CLICK EVENTS
// =====================
window.addEventListener("click",(event)=>{

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse,camera);

  const hits = raycaster.intersectObjects(projects);

  if(hits.length > 0){
    const obj = hits[0].object;
    alert("Opened: " + obj.userData.name);

    // real use case:
    // window.open(obj.userData.url, "_blank");
  }
});

// =====================
// ANIMATION LOOP (CINEMATIC CAMERA)
// =====================
function animate(){
  requestAnimationFrame(animate);

  // 🎬 cinematic scroll movement (smooth camera travel)
  camera.position.z = 5 + scrollY * 0.05;

  // slight cinematic drift
  camera.position.x = Math.sin(scrollY * 0.001) * 2;
  camera.position.y = Math.cos(scrollY * 0.0015) * 1;

  camera.lookAt(0,0,-20);

  // ✨ object animation
  projects.forEach((p,i)=>{
    p.rotation.x += 0.003;
    p.rotation.y += 0.006;

    // glow pulse illusion
    const scale = 1 + Math.sin(Date.now()*0.001 + i) * 0.05;
    p.scale.set(scale,scale,scale);
  });

  renderer.render(scene,camera);
}

animate();

// =====================
// RESIZE
// =====================
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
