<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kousik Onteru | Premium Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

/* GLOW CURSOR */
.cursor{
  width:20px;
  height:20px;
  border:2px solid cyan;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:0.1s;
  z-index:999;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

nav h1{color:cyan;}
nav a{color:#fff;margin-left:20px;text-decoration:none;}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{
  font-size:55px;
}

.hero span{
  color:cyan;
  text-shadow:0 0 20px cyan;
}

.btn{
  margin-top:20px;
  padding:12px 30px;
  background:cyan;
  color:black;
  border:none;
  cursor:pointer;
  border-radius:30px;
}

/* 3D CARD */
.card{
  width:280px;
  height:180px;
  background:#111;
  border-radius:15px;
  overflow:hidden;
  transition:transform 0.3s;
}

.card:hover{
  transform:rotateY(10deg) rotateX(10deg) scale(1.05);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* GRID */
.portfolio{
  padding:80px 20px;
  text-align:center;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  margin-top:40px;
}

/* ABOUT */
.about{
  padding:80px 20px;
  text-align:center;
  background:#0a0a0a;
}

/* CONTACT */
.contact{
  padding:80px 20px;
  text-align:center;
}

.contact a{
  display:inline-block;
  margin:10px;
  color:cyan;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
}

/* MOBILE */
@media(max-width:600px){
  .hero h2{font-size:30px;}
}
</style>
</head>

<body>

<div class="cursor"></div>

<nav>
  <h1>Kousik</h1>
  <div>
    <a href="#home">Home</a>
    <a href="#portfolio">Work</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero" id="home">
  <h2>Create <span>Viral Thumbnails</span></h2>
  <p>Boost CTR & Grow Fast 🚀</p>
  <button class="btn" onclick="go()">View Work</button>
</section>

<section class="portfolio" id="portfolio">
  <h2>My Work</h2>
  <div class="grid">
    <div class="card"><img src="thumb1.jpg"></div>
    <div class="card"><img src="thumb2.jpg"></div>
    <div class="card"><img src="thumb3.jpg"></div>
    <div class="card"><img src="thumb4.jpg"></div>
  </div>
</section>

<section class="about">
  <h2>About Me</h2>
  <p>I am Kousik Onteru, helping creators go viral with high CTR thumbnails.</p>
</section>

<section class="contact" id="contact">
  <h2>Contact</h2>
  <a href="https://wa.me/91XXXXXXXXXX">WhatsApp</a>
  <a href="#">Instagram</a>
  <a href="mailto:youremail@gmail.com">Email</a>
</section>

<footer>
  <p>© 2026 Kousik Onteru</p>
</footer>

<script>
/* CURSOR EFFECT */
const cursor = document.querySelector('.cursor');
document.addEventListener('mousemove', e=>{
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

/* SCROLL */
function go(){
  document.getElementById("portfolio").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
