<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acko Style Portfolio FIXED</title>

<style>
body{
  margin:0;
  background:#000;
  overflow-x:hidden;
  font-family:Arial;
}

/* scroll area */
.scroll{
  height:400vh;
}

canvas{
  position:fixed;
  top:0;
  left:0;
}

.ui{
  position:fixed;
  top:20px;
  left:20px;
  color:#00ffff;
  z-index:10;
  font-size:14px;
}
</style>
</head>

<body>

<div class="ui">🔥 FIXED Acko-Style 3D Portfolio</div>
<div class="scroll"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// =====================
// SAFE SCENE SETUP
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 80);

// CAMERA (IMPORTANT FIX)
const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(0,0,5);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// =====================
// LIGHTS (CRITICAL FIX)
// =====================
const light = new THREE.PointLight(0x00ffff, 2);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x222222));

// =====================
// SAFE OBJECTS (NO BLACK SCREEN)
// =====================
const objects = [];

const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshStandardMaterial({
  color:0x00ffff,
  metalness:0.5,
  roughness:0.3
});

// FIX: keep objects ALWAYS in view range
for(let i=0;i<15;i++){
  const box = new THREE.Mesh(geometry, material);

  box.position.x = (Math.random()-0.5)*6;
  box.position.y = (Math.random()-0.5)*6;
  box.position.z = -i*3;

  scene.add(box);
  objects.push(box);
}

// =====================
// SAFE SCROLL SYSTEM (IMPORTANT FIX)
// =====================
let scrollY = 0;
let targetZ = 5;

window.addEventListener("scroll",()=>{
  scrollY = window.scrollY;
});

// =====================
// ANIMATION LOOP (FIXED + SMOOTH)
// =====================
function animate(){
  requestAnimationFrame(animate);

  // SAFE CAMERA MOVEMENT (NO EXPLOSION)
  targetZ = 5 + scrollY * 0.02;

  camera.position.z += (targetZ - camera.position.z) * 0.08;

  camera.position.x = Math.sin(scrollY * 0.001) * 1.5;
  camera.position.y = Math.cos(scrollY * 0.0012) * 1.2;

  camera.lookAt(0,0,-10);

  // rotate objects slowly
  objects.forEach((o)=>{
    o.rotation.x += 0.01;
    o.rotation.y += 0.01;
  });

  renderer.render(scene,camera);
}

animate();

// =====================
// RESIZE FIX
// =====================
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
