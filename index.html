<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kousik Onteru | Real 3D Portfolio</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  overflow-x:hidden;
  background:#000;
  color:white;
}

/* UI OVERLAY */
.ui{
  position:fixed;
  z-index:10;
  width:100%;
  text-align:center;
  top:20px;
  font-size:14px;
  opacity:0.8;
  color:cyan;
}

section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* fake scroll space */
.scroll{
  height:300vh;
}

/* canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div class="ui">🔥 Kousik Real 3D Portfolio (Scroll to move)</div>

<div class="scroll"></div>

<section>
  <h1>Welcome</h1>
  <p>3D Portfolio Experience</p>
</section>

<section>
  <h1>My Work</h1>
</section>

<section>
  <h1>Contact Me</h1>
</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// =========================
// SCENE SETUP
// =========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =========================
// LIGHTS
// =========================
const light = new THREE.PointLight(0x00ffff, 2);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x222222));

// =========================
// 3D OBJECTS (PORTFOLIO WORLD)
// =========================
const objects = [];

const geometry = new THREE.IcosahedronGeometry(1,0);
const material = new THREE.MeshStandardMaterial({
  color:0x00ffff,
  wireframe:true
});

// create multiple floating objects
for(let i=0;i<25;i++){
  const mesh = new THREE.Mesh(geometry, material);

  mesh.position.x = (Math.random()-0.5)*15;
  mesh.position.y = (Math.random()-0.5)*15;
  mesh.position.z = -i*4;

  scene.add(mesh);
  objects.push(mesh);
}

camera.position.z = 5;

// =========================
// SCROLL CONTROL
// =========================
let scrollY = 0;

window.addEventListener("scroll",()=>{
  scrollY = window.scrollY;
});

// =========================
// MOUSE INTERACTION
// =========================
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove",(e)=>{
  mouseX = (e.clientX/window.innerWidth - 0.5)*2;
  mouseY = (e.clientY/window.innerHeight - 0.5)*2;
});

// =========================
// ANIMATION LOOP
// =========================
function animate(){
  requestAnimationFrame(animate);

  // camera scroll movement (ACKO style)
  camera.position.z = 5 + scrollY * 0.03;
  camera.position.x = mouseX * 2;
  camera.position.y = -mouseY * 2;

  // rotate objects
  objects.forEach((obj,i)=>{
    obj.rotation.x += 0.01;
    obj.rotation.y += 0.01;
  });

  renderer.render(scene, camera);
}

animate();

// =========================
// RESIZE FIX
// =========================
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
