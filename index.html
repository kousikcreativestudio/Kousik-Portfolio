<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kousik Onteru | 3D Designer Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#000;
  overflow-x:hidden;
  color:#fff;
}

/* PARTICLES BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  position:fixed;
  width:100%;
  z-index:10;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

nav h1{
  color:#00ffff;
  letter-spacing:2px;
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

/* HERO 3D */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  perspective:1000px;
}

.card3d{
  transform-style:preserve-3d;
  transition:0.2s;
  padding:40px;
}

.hero h2{
  font-size:60px;
  transform:translateZ(60px);
}

.hero span{
  color:#00ffff;
  text-shadow:0 0 20px cyan;
}

.hero p{
  margin-top:10px;
  opacity:0.8;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 30px;
  background:linear-gradient(45deg,#00ffff,#0066ff);
  border:none;
  border-radius:30px;
  color:black;
  cursor:pointer;
  font-weight:bold;
}

/* PORTFOLIO */
.section{
  padding:80px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:40px;
}

.item{
  height:180px;
  background:#111;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
  transform-style:preserve-3d;
}

.item:hover{
  transform:rotateY(15deg) rotateX(10deg) scale(1.05);
  box-shadow:0 0 25px cyan;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ABOUT */
.about{
  background:#0a0a0a;
}

/* CONTACT */
.contact a{
  display:inline-block;
  margin:10px;
  color:#00ffff;
}

/* MOBILE */
@media(max-width:600px){
  .hero h2{font-size:32px;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
  <h1>Kousik</h1>
  <div>
    <a href="#home">Home</a>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="card3d" id="card">
    <h2>I Create <span>3D Viral Thumbnails</span></h2>
    <p>Next Level CTR Boost Design 🚀</p>
    <button class="btn" onclick="scrollToWork()">View My Work</button>
  </div>
</section>

<!-- WORK -->
<section class="section" id="work">
  <h2>My Work</h2>
  <div class="grid">
    <div class="item"><img src="thumb1.jpg"></div>
    <div class="item"><img src="thumb2.jpg"></div>
    <div class="item"><img src="thumb3.jpg"></div>
    <div class="item"><img src="thumb4.jpg"></div>
  </div>
</section>

<!-- ABOUT -->
<section class="section about">
  <h2>About Me</h2>
  <p>I am a 3D thumbnail designer helping YouTubers go viral with high CTR visuals.</p>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
  <h2>Contact</h2>
  <a href="https://wa.me/91XXXXXXXXXX">WhatsApp</a>
  <a href="#">Instagram</a>
  <a href="mailto:youremail@gmail.com">Email</a>
</section>

<script>
/* 3D MOUSE MOVE EFFECT */
const card = document.getElementById("card");

document.addEventListener("mousemove",(e)=>{
  let x = (window.innerWidth/2 - e.pageX)/25;
  let y = (window.innerHeight/2 - e.pageY)/25;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* SCROLL */
function scrollToWork(){
  document.getElementById("work").scrollIntoView({behavior:"smooth"});
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

for(let i=0;i<80;i++){
  particlesArray.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*3,
    speedX:Math.random()*1-0.5,
    speedY:Math.random()*1-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particlesArray){
    p.x += p.speedX;
    p.y += p.speedY;

    if(p.x<0 || p.x>canvas.width) p.speedX *= -1;
    if(p.y<0 || p.y>canvas.height) p.speedY *= -1;

    ctx.fillStyle="cyan";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
